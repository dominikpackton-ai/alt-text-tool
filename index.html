<!DOCTYPE html>
<html>
<head>
<title>Alt Text Generator</title>
</head>

<body style="font-family:Arial;text-align:center;">

<h2>🖼️ Bulk Alt Text Generator</h2>

<textarea id="urls" placeholder="Enter URLs (one per line)" 
style="width:80%;height:150px;"></textarea><br><br>

<button onclick="run()">Generate Alt Text</button>

<table border="1" style="margin-top:20px;width:100%;">
<tr>
<th>Page</th>
<th>Image</th>
<th>Alt Text</th>
</tr>
<tbody id="output"></tbody>
</table>

<script>
async function run(){
    let urls = document.getElementById("urls").value.split("\n");

    let res = await fetch("http://localhost:3000/extract", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({urls})
    });

    let data = await res.json();

    let html = "";

    data.forEach(d => {
        html += `<tr>
        <td>${d.page}</td>
        <td>${d.image}</td>
        <td>${d.alt}</td>
        </tr>`;
    });

    document.getElementById("output").innerHTML = html;
}
</script>

</body>
</html>
